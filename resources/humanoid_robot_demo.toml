window_title = "AGV + Lift + DualArm + Hand(URDF) 3D Simulator"
window_width = 1460
window_height = 920

[agv]
profile = "woosh_agv.toml"
color = "#6c757d"

[[chains]]
name = "lift"
urdf = "lift.urdf"
color = "#8d99ae"
mount_type = "world"
base_translation = [0.0, 0.0, 0.05]
# 可选：覆盖URDF默认初始值（长度需与可动关节数一致）
# init_values = [0.0, 0.2]

[[chains]]
name = "left_arm"
urdf = "left_arm.urdf"
color = "#1d3557"
mount_type = "link"
parent = "lift"
# 装配到 parent URDF 的指定 link；Y 形 lift 时可分别指向 left/right 安装 link
parent_link = "left_tcp_link"
mount_translation = [0.0, 0.0, 0.0]

[[chains]]
name = "right_arm"
urdf = "right_arm.urdf"
color = "#457b9d"
mount_type = "link"
parent = "lift"
parent_link = "right_tcp_link"
mount_translation = [0.0, 0.0, 0.0]

[[chains]]
name = "m10_hand"
urdf = "m10_hand.urdf"
color = "#e76f51"
mount_type = "tcp"
parent = "left_arm"
mount_translation = [0.0, 0.0, 0.0]

[[chains]]
name = "dof3_hand"
urdf = "dof3_hand.urdf"
color = "#f4a261"
mount_type = "tcp"
parent = "right_arm"
mount_translation = [0.0, 0.0, 0.0]
