[network]
# 基础控制工控机。qmlinker 二次开发接口连接该地址。
base_control_ip = "192.168.100.50"

# Orin 模组。用于 SSH 登录、相机/边缘计算等非 qmlinker 控制链路。
orin_ip = "192.168.100.60"

# 大寰夹爪服务端口。
gripper_port = 50066

[qmlinker]
host = "192.168.100.60"
port = 50062
data_port = 50061
default_speed_ratio = 0.3
request_timeout_s = 3.0
stream_first_timeout_s = 2.0

[hand.left]
spec = "hand_3"

[hand.right]
spec = "hand_3"
